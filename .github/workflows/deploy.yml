name: Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set vnu cache key
        id: vnu-key
        run: echo "key=vnu-jar-$(date +%Y-W%U)" >> $GITHUB_OUTPUT

      - name: Cache vnu.jar
        id: cache-vnu
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/vnu.jar
          key: ${{ steps.vnu-key.outputs.key }}
          restore-keys: vnu-jar-

      - name: Download vnu.jar
        if: steps.cache-vnu.outputs.cache-hit != 'true'
        run: curl -sL -o /tmp/vnu.jar https://github.com/validator/validator/releases/latest/download/vnu.jar

      - name: Validate HTML
        run: java -jar /tmp/vnu.jar --errors-only index.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/" index.html
          sed -i "s/\"availabilityStarts\": \"[0-9-]*\"/\"availabilityStarts\": \"$TODAY\"/" index.html
          sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|" sitemap.xml

      - name: Generate GitHub contribution graph
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request
          token = os.environ["GH_TOKEN"]
          query = json.dumps({"query": '{ user(login: "Koalatyyy") { contributionsCollection { contributionCalendar { totalContributions weeks { contributionDays { contributionCount weekday } } } } } }'})
          req = urllib.request.Request("https://api.github.com/graphql", data=query.encode(), headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"})
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
          cal = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]
          weeks = cal["weeks"]
          C, G, S = 11, 2, 13
          width, height = len(weeks) * S, 7 * S
          def color(n):
              if n == 0: return "#161b22"
              if n <= 3: return "#0e4429"
              if n <= 6: return "#006d32"
              if n <= 9: return "#26a641"
              return "#39d353"
          rects = [f'<rect x="{wi*S}" y="{d["weekday"]*S}" width="{C}" height="{C}" rx="2" fill="{color(d["contributionCount"])}"/>' for wi, week in enumerate(weeks) for d in week["contributionDays"]]
          svg = f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {width} {height}" role="img" aria-label="GitHub contribution graph">{"".join(rects)}</svg>'
          with open("assets/github-contributions.svg", "w") as f:
              f.write(svg)
          print(f"Generated: {cal['totalContributions']} contributions, {len(weeks)} weeks")
          PYEOF

      - name: Sync writing posts to index.html
        run: node scripts/sync-writing.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build blog
        run: cd blog && npm install && npm run build

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/CLAUDE.md
            blog/**

      - name: Deploy blog to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./blog/_site/
          server-dir: /www/blog/

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Ping IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            --data '{"host":"www.haggath.re","key":"97dad8073f95443d944e286b8cf22bb8","urlList":["https://www.haggath.re/","https://www.haggath.re/blog/","https://www.haggath.re/blog/guardduty-suppression-rules/","https://www.haggath.re/blog/macie-suppression-rules/"]}'


