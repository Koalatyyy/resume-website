name: Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate HTML
        run: |
          curl -s -o /tmp/vnu.jar https://github.com/validator/validator/releases/latest/download/vnu.jar
          java -jar /tmp/vnu.jar --errors-only index.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>$TODAY</lastmod>|" sitemap.xml

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/CLAUDE.md
            **/.htaccess

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Ping IndexNow
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=https://www.haggath.re/&key=97dad8073f95443d944e286b8cf22bb8"

      - name: Submit sitemap to Google
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.haggath.re/sitemap.xml"

      - name: Uptime check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.haggath.re)
          if [ "$STATUS" != "200" ]; then
            echo "Site returned HTTP $STATUS — deploy may have failed"
            exit 1
          fi
          echo "Site is up (HTTP $STATUS)"
