name: Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set vnu cache key
        id: vnu-key
        run: echo "key=vnu-jar-$(date +%Y-W%U)" >> $GITHUB_OUTPUT

      - name: Cache vnu.jar
        id: cache-vnu
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/vnu.jar
          key: ${{ steps.vnu-key.outputs.key }}
          restore-keys: vnu-jar-

      - name: Download vnu.jar
        if: steps.cache-vnu.outputs.cache-hit != 'true'
        run: curl -sL -o /tmp/vnu.jar https://github.com/validator/validator/releases/latest/download/vnu.jar

      - name: Validate HTML
        run: java -jar /tmp/vnu.jar --errors-only index.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/" index.html
          sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|" sitemap.xml

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/CLAUDE.md

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Ping IndexNow
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=https://www.haggath.re/&key=97dad8073f95443d944e286b8cf22bb8"


