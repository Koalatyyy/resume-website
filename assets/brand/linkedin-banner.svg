<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        src: url('data:font/woff2;base64,FONT_B64_PLACEHOLDER') format('woff2');
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0f172a"/>

  <!-- Accent stripe at 80% width -->
  <rect x="1267" y="40" width="4" height="316" fill="#38bdf8" opacity="0.6"/>

  <!-- Name row, horizontally centred -->
  <text
    x="792" y="175"
    font-family="Inter, system-ui, sans-serif"
    font-size="58"
    letter-spacing="-1"
    text-anchor="middle"
  >
    <tspan font-weight="400" fill="#f1f5f9">Thomas </tspan><tspan font-weight="700" fill="#38bdf8">Haggath</tspan>
  </text>
  <!-- Separator rule, centred (500px wide → 542–1042) -->
  <rect x="542" y="195" width="500" height="3" fill="#38bdf8"/>
  <!-- Title row, horizontally centred -->
  <text
    x="792" y="238"
    font-family="Inter, system-ui, sans-serif"
    font-weight="400"
